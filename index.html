<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=table_data_cleaner.html">
    <title>Excel表格数据清理工具 - 自动重定向</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .features {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .features h3 {
            margin-bottom: 15px;
            font-size: 20px;
            color: #f0f0f0;
        }

        .features ul {
            list-style: none;
            padding-left: 0;
        }

        .features li {
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
        }

        .features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #4CAF50;
            font-weight: bold;
        }

        .redirect-message {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .countdown {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            margin: 10px 0;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
        }

        .btn-primary:hover {
            background: #0d62d9;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }

        .footer a {
            color: #FFD700;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 16px;
            }
            
            .btn {
                padding: 12px 24px;
                width: 100%;
            }
            
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📊</div>
        <h1>Excel表格数据清理工具</h1>
        <p class="subtitle">上传文件 · 清理空格 · 生成干净数据</p>
        
        <div class="redirect-message">
            <p>正在为您跳转到表格数据清理工具页面...</p>
            <div class="countdown" id="countdown">3</div>
            <p>如果页面没有自动跳转，请点击下方按钮</p>
        </div>
        
        <div class="features">
            <h3>主要功能</h3>
            <ul>
                <li>支持CSV和Excel文件格式</li>
                <li>自动清理所有空格（开头、结尾、中间）</li>
                <li>多种清理模式可选</li>
                <li>实时数据预览对比</li>
                <li>支持输出为CSV或Excel格式</li>
                <li>纯前端处理，数据安全有保障</li>
            </ul>
        </div>
        
        <div class="buttons">
            <a href="table_data_cleaner.html" class="btn btn-primary">
                <span>🚀 立即使用工具</span>
            </a>
            <a href="https://github.com/ft-1-a/Excel-tool" class="btn btn-secondary" target="_blank">
                <span>📁 查看GitHub仓库</span>
            </a>
        </div>
        
        <div class="footer">
            <p>© 2026 表格数据清理工具 | 基于GitHub Pages部署</p>
            <p>问题反馈：<a href="https://github.com/ft-1-a/Excel-tool/issues" target="_blank">提交Issue</a></p>
        </div>
    </div>

    <script>
        // 倒计时功能
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                // 如果3秒后还没跳转，强制跳转
                window.location.href = 'table_data_cleaner.html';
            }
        }, 1000);

        // 防止重复跳转
        let hasRedirected = false;
        
        window.addEventListener('beforeunload', () => {
            hasRedirected = true;
        });

        // 3秒后自动跳转
        setTimeout(() => {
            if (!hasRedirected) {
                window.location.href = 'table_data_cleaner.html';
            }
        }, 3000);
    </script>
</body>
</html>
